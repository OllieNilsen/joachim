name: reusable-rust-ci

on:
  workflow_call:
    inputs:
      manifest-path:
        description: "Path to Cargo.toml"
        required: false
        default: "Cargo.toml"
        type: string
      use-ec2-runner:
        description: "Run clippy/tests on a self-hosted EC2 runner"
        required: false
        default: false
        type: boolean
      ec2-runner-label:
        description: "Runner label for EC2 compile worker"
        required: false
        default: ec2-rust
        type: string
      sccache-s3-bucket:
        description: "S3 bucket name for sccache artifacts"
        required: false
        default: ""
        type: string
      aws-region:
        description: "AWS region for sccache S3 bucket"
        required: false
        default: us-east-1
        type: string
      test-args:
        description: "Additional args passed to cargo test"
        required: false
        default: ""
        type: string

permissions:
  contents: read

jobs:
  static-checks:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    concurrency:
      group: rust-ci-${{ inputs.manifest-path }}-${{ github.ref }}
      cancel-in-progress: true
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt

      - name: Check formatting
        run: cargo fmt --manifest-path ${{ inputs.manifest-path }} --all -- --check

      - name: Install cargo-audit
        run: |
          AUDIT_VERSION="v0.22.1"
          curl -fsSL "https://github.com/rustsec/rustsec/releases/download/cargo-audit%2F${AUDIT_VERSION}/cargo-audit-x86_64-unknown-linux-musl-${AUDIT_VERSION}.tgz" | tar xz
          sudo mv cargo-audit-x86_64-unknown-linux-musl-${AUDIT_VERSION}/cargo-audit /usr/local/bin/
          rm -rf cargo-audit-x86_64-unknown-linux-musl-${AUDIT_VERSION}

      - name: Security audit
        run: |
          MANIFEST_DIR=$(dirname "${{ inputs.manifest-path }}")
          cd "$MANIFEST_DIR"
          cargo audit || true

  compile-and-test-gh:
    if: ${{ !inputs.use-ec2-runner }}
    needs: [static-checks]
    runs-on: ubuntu-latest
    timeout-minutes: 60
    concurrency:
      group: rust-ci-compile-${{ inputs.manifest-path }}-${{ github.ref }}
      cancel-in-progress: true
    env:
      CARGO_BUILD_JOBS: "2"
      RUSTFLAGS: "-C codegen-units=4 -C lto=off"
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy

      - name: Configure swap
        run: |
          if [ ! -f /mnt/swapfile ]; then
            sudo fallocate -l 4G /mnt/swapfile
            sudo chmod 600 /mnt/swapfile
            sudo mkswap /mnt/swapfile
          fi
          sudo swapon /mnt/swapfile 2>/dev/null || true

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target/
          key: rust-${{ runner.os }}-${{ hashFiles('**/Cargo.lock', '**/Cargo.toml') }}
          restore-keys: rust-${{ runner.os }}-

      - name: Clippy lint
        run: cargo clippy --manifest-path ${{ inputs.manifest-path }} --all-targets --all-features -j 2 -- -D warnings

      - name: Run tests
        run: cargo test --manifest-path ${{ inputs.manifest-path }} --all -j 2 ${{ inputs.test-args && format('-- {0}', inputs.test-args) || '' }}

  compile-and-test-ec2:
    if: ${{ inputs.use-ec2-runner }}
    needs: [static-checks]
    runs-on:
      - self-hosted
      - linux
      - x64
      - ${{ inputs.ec2-runner-label }}
    timeout-minutes: 45
    concurrency:
      group: rust-ci-compile-${{ inputs.manifest-path }}-${{ github.ref }}
      cancel-in-progress: true
    env:
      SCCACHE_BUCKET: ${{ inputs.sccache-s3-bucket }}
      SCCACHE_REGION: ${{ inputs.aws-region }}
      SCCACHE_S3_USE_SSL: "true"
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install base build tools
        run: sudo apt-get update && sudo apt-get install -y build-essential pkg-config libssl-dev

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy

      - name: Install sccache
        run: |
          if ! command -v sccache >/dev/null 2>&1; then
            SCCACHE_VERSION="v0.9.1"
            curl -fsSL "https://github.com/mozilla/sccache/releases/download/${SCCACHE_VERSION}/sccache-${SCCACHE_VERSION}-x86_64-unknown-linux-musl.tar.gz" | tar xz
            sudo mv sccache-*/sccache /usr/local/bin/
            rm -rf sccache-*
          fi

      - name: Configure sccache
        if: inputs.sccache-s3-bucket != ''
        run: |
          echo "RUSTC_WRAPPER=$(command -v sccache)" >> "$GITHUB_ENV"
          echo "SCCACHE_IDLE_TIMEOUT=0" >> "$GITHUB_ENV"
          sccache --start-server || true
          sccache --show-stats || true

      - name: Clippy lint
        run: cargo clippy --manifest-path ${{ inputs.manifest-path }} --all-targets --all-features -- -D warnings

      - name: Run tests
        run: cargo test --manifest-path ${{ inputs.manifest-path }} --all ${{ inputs.test-args && format('-- {0}', inputs.test-args) || '' }}

      - name: sccache stats
        if: always() && inputs.sccache-s3-bucket != ''
        run: sccache --show-stats || true
